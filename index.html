<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semangat Buat Rizki! 💖</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            color: #d6336c;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            width: 80%;
            max-width: 500px;
            z-index: 10;
        }
        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
            margin: 10px;
        }
        #btnSemangat {
            background-color: #ff4757;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }
        #btnSemangat:hover {
            transform: scale(1.05);
            background-color: #ff6b81;
        }
        #btnNyerah {
            background-color: #a4b0be;
            color: white;
            position: relative;
        }
        #pesanRahasia {
            margin-top: 20px;
            font-size: 1.3rem;
            color: #ff4757;
            font-weight: bold;
            min-height: 60px;
        }
        .emoji-rain {
            position: absolute;
            font-size: 2.5rem;
            z-index: 1;
            animation: fall 2s linear forwards;
        }
        @keyframes fall {
            to {
                transform: translateY(100vh);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Halo Rizki Dwi Yuliarti Sayang! 💖</h1>
        <p>Lagi capek banget ya sama kegiatannya? Sini istirahat bentar, Haniif punya sesuatu buat kamu!</p>
        
        <div>
            <button id="btnSemangat">Pencet Ini Biar Semangat!</button>
            <button id="btnNyerah">Aku capek, nyerah aja deh</button>
        </div>

        <div id="pesanRahasia"></div>
    </div>

    <script>
        const btnSemangat = document.getElementById('btnSemangat');
        const btnNyerah = document.getElementById('btnNyerah');
        const pesanRahasia = document.getElementById('pesanRahasia');

        // Kumpulan pesan acak yang akan muncul
        const daftarPesan = [
            "Semangat terus cintaku! Kamu pasti bisa ngelewatin ini! 🚀",
            "Capek boleh, istirahat boleh, tapi ingat ada Haniif yang selalu dukung kamu! 🥰",
            "Senyum dulu dong! Kalau kamu senyum, capeknya ilang (sedikit) 😝",
            "Coba tarik napas... hembuskan... Kamu itu hebat banget tau! 🌟",
            "Jangan lupa makan dan minum air putih ya, biar kuat hadapin dunia (dan dengerin aku cerita soal hukum dan mobil hehe) 😘"
        ];

        // Interaksi Tombol Semangat
        btnSemangat.addEventListener('click', () => {
            const pesanAcak = daftarPesan[Math.floor(Math.random() * daftarPesan.length)];
            pesanRahasia.innerHTML = pesanAcak;
            buatHujanEmoji();
        });

        // Interaksi Tombol Nyerah (Kabur saat di-hover/didekati mouse)
        btnNyerah.addEventListener('mouseover', () => {
            // Hitung posisi acak di dalam layar
            const x = Math.random() * (window.innerWidth - btnNyerah.clientWidth);
            const y = Math.random() * (window.innerHeight - btnNyerah.clientHeight);
            
            btnNyerah.style.position = 'absolute';
            btnNyerah.style.left = `${x}px`;
            btnNyerah.style.top = `${y}px`;
        });

        // Fungsi membuat animasi hujan emoji
        function buatHujanEmoji() {
            const emojis = ['💖', '✨', '🥰', '🚀', '🌸'];
            for (let i = 0; i < 20; i++) {
                const emoji = document.createElement('div');
                emoji.classList.add('emoji-rain');
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Posisi acak horizontal
                emoji.style.left = Math.random() * 100 + 'vw';
                emoji.style.top = '-50px';
                
                // Durasi jatuh yang sedikit berbeda
                emoji.style.animationDuration = (Math.random() * 1 + 1.5) + 's';
                
                document.body.appendChild(emoji);

                // Hapus elemen setelah animasi selesai agar memori tidak berat
                setTimeout(() => {
                    emoji.remove();
                }, 2500);
            }
        }
    </script>

</body>
</html>
